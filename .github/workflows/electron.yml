name: Electron Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: packages/db
        run: pnpx prisma generate

      - name: Build workspace dependencies
        run: pnpm turbo run build --filter='@repo/provider-agent^...'

      - name: Write agent .env
        run: |
          {
            echo "AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}"
            echo "AZURE_STORAGE_CONTAINER_INPUTS=${AZURE_STORAGE_CONTAINER_INPUTS}"
            echo "AZURE_STORAGE_CONTAINER_OUTPUTS=${AZURE_STORAGE_CONTAINER_OUTPUTS}"
            echo "WEB_URL=${WEB_URL}"
            echo "API_URL=${API_URL}"
          } > apps/agent/.env
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER_INPUTS: ${{ secrets.AZURE_STORAGE_CONTAINER_INPUTS }}
          AZURE_STORAGE_CONTAINER_OUTPUTS: ${{ secrets.AZURE_STORAGE_CONTAINER_OUTPUTS }}
          WEB_URL: ${{ secrets.WEB_URL }}
          API_URL: ${{ secrets.API_URL }}

      - name: Build Electron app
        working-directory: apps/agent
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: zan-provider-agent-linux
          path: |
            apps/agent/dist/*.AppImage
            apps/agent/dist/*.deb
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: zan-provider-agent-windows
          path: apps/agent/dist/*.exe
          if-no-files-found: warn

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: zan-provider-agent-macos
          path: apps/agent/dist/*.dmg
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
